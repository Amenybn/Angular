<div class="page-header">
  <h1>Nouvelle annonce</h1>
  <p>Remplissez le formulaire pour publier une annonce</p>
</div>

<div class="card-modern form-card">
  <form [formGroup]="formR">
    <div class="mb-3">
      <label class="form-label-custom">ID</label>
      <input type="number" formControlName="id" class="form-control">
      <div class="alert alert-danger mt-1 py-1 small" *ngIf="formR.get('id')?.invalid && formR.get('id')?.touched">
        ID requis (min. 1 caractère).
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">Titre</label>
      <input type="text" formControlName="title" class="form-control" placeholder="Ex: Appartement centre-ville">
      <div class="alert alert-danger mt-1 py-1 small" *ngIf="formR.get('title')?.invalid && formR.get('title')?.touched">
        Commence par une majuscule (ex: Appartement).
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">Prix (TND)</label>
      <input type="text" formControlName="price" class="form-control" placeholder="Ex: 250000">
      <div class="alert alert-danger mt-1 py-1 small" *ngIf="formR.get('price')?.errors?.['maxlength']">
        Maximum 10 caractères.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">ID Résidence</label>
      <input type="text" formControlName="residenceid" class="form-control" placeholder="Ex: 12">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" (click)="add()" [disabled]="formR.invalid">Publier</button>
      <a routerLink="/annonce" class="btn btn-outline-secondary">Annuler</a>
    </div>
  </form>
</div>
