<div class="page-header">
  <h1>Détails de l'annonce</h1>
  <p>Informations complètes sur la publication #{{ listannonce.id }}</p>
</div>

<div class="card-modern detail-panel">
  <div class="detail-row">
    <span class="text-muted">ID</span>
    <strong>{{ listannonce.id }}</strong>
  </div>
  <div class="detail-row">
    <span class="text-muted">Titre (innerHTML)</span>
    <div [innerHTML]="htmlContent"></div>
  </div>
  <div class="detail-row">
    <span class="text-muted">Prix</span>
    <strong class="price-tag">{{ listannonce.price }} TND</strong>
  </div>
  <div class="detail-row">
    <span class="text-muted">Résidence</span>
    <strong>#{{ listannonce.residenceid }}</strong>
  </div>

  <div class="vuln-panel p-3 mt-4 rounded">
    <h6 class="text-danger mb-2">⚠️ Commentaire XSS</h6>
    <textarea class="form-control mb-2" rows="2" [(ngModel)]="userComment" placeholder="<img src=x onerror=alert(1)>"></textarea>
    <button class="btn btn-warning btn-sm" (click)="addComment()">Afficher commentaire (innerHTML)</button>
    <div class="vuln-output mt-2" *ngIf="commentHtml" [innerHTML]="commentHtml"></div>
  </div>

  <div class="mt-4">
    <a routerLink="/annonce" class="btn btn-outline-secondary">← Retour à la liste</a>
  </div>
</div>
