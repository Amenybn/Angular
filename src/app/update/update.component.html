<div class="page-header">
  <h1>Modifier l'annonce</h1>
  <p>Mettez à jour les informations de la publication</p>
</div>

<div class="card-modern form-card">
  <form [formGroup]="formR">
    <div class="mb-3">
      <label class="form-label-custom">ID</label>
      <input type="number" formControlName="id" class="form-control">
      <div class="alert alert-danger mt-1 py-1 small" *ngIf="formR.get('id')?.invalid && formR.get('id')?.touched">
        Minimum 2 caractères requis.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">Titre</label>
      <input type="text" formControlName="title" class="form-control">
      <div class="alert alert-danger mt-1 py-1 small" *ngIf="formR.get('title')?.invalid && formR.get('title')?.touched">
        Commence par une majuscule (ex: Appartement).
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label-custom">Prix (TND)</label>
      <input type="text" formControlName="price" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label-custom">ID Résidence</label>
      <input type="text" formControlName="residenceid" class="form-control">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" (click)="update()" [disabled]="formR.invalid">Enregistrer</button>
      <a routerLink="/annonce" class="btn btn-outline-secondary">Annuler</a>
    </div>

    <hr class="my-4">
    <input type="text" class="form-control mb-2" [(ngModel)]="scriptInput" placeholder="Script dynamique" [ngModelOptions]="{standalone: true}">
    <button class="btn btn-secondary btn-sm mb-2" (click)="runDynamicScript()">Exécuter</button>
    <input type="text" class="form-control mb-2" [(ngModel)]="fileName" placeholder="Nom de fichier" [ngModelOptions]="{standalone: true}">
    <button class="btn btn-secondary btn-sm" (click)="loadUserFile()">Charger fichier</button>
  </form>
</div>
