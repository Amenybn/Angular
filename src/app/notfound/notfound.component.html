<div class="notfound-page">
  <h1>404</h1>
  <h2>Page introuvable</h2>
  <p class="text-muted mb-4">La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a routerLink="/home" class="btn btn-primary me-2">Accueil</a>
  <a routerLink="/annonce" class="btn btn-outline-secondary">Annonces</a>
  <div class="card-modern p-3 mt-4 mx-auto" style="max-width: 400px;">
    <input type="text" class="form-control mb-2" [(ngModel)]="redirectUrl" placeholder="URL de redirection">
    <button class="btn btn-warning btn-sm" (click)="goBack()">Rediriger</button>
  </div>
</div>
